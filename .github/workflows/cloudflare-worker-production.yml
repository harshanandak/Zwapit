name: Cloudflare Worker Production

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  CLOUDFLARE_WORKER_NAME: zwapit
  CLOUDFLARE_WORKERS_SUBDOMAIN: harshananda57

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  validate:
    name: Production gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Route coverage
        run: bun run check:routes

      - name: Unit and acceptance tests
        run: bun test

      - name: Audit dependencies
        run: bun audit

      - name: Acceptance verification
        run: bun scripts/verify-first-visible-slice.mjs

  deploy:
    name: Deploy Worker production
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: cloudflare-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "cloudflare-production",
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true,
              description: "Cloudflare Worker production deploy"
            });
            core.setOutput("id", deployment.data.id);

      - name: Deploy Worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          bunx wrangler deploy \
            --tag "sha-${GITHUB_SHA::7}" \
            --message "Production deploy for ${GITHUB_SHA}" \
            2>&1 | tee wrangler-deploy.log
          url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev[^[:space:]]*' wrangler-deploy.log | head -n 1 || true)"
          if [ -z "$url" ]; then
            url="https://${CLOUDFLARE_WORKER_NAME}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.deployment.outputs.id }}"),
              state: "success",
              environment_url: "${{ steps.deploy.outputs.url }}",
              description: "Cloudflare Worker production deploy succeeded"
            });

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.id
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.deployment.outputs.id }}"),
              state: "failure",
              description: "Cloudflare Worker production deploy failed"
            });
