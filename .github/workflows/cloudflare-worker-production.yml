name: Cloudflare Worker Production

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  CLOUDFLARE_WORKER_NAME: zwapit
  CLOUDFLARE_WORKERS_SUBDOMAIN: harshananda57

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  validate:
    name: Production gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Route coverage
        run: bun run check:routes

      - name: Unit and acceptance tests
        run: bun test

      - name: Audit dependencies
        run: bun audit

      - name: Acceptance verification
        run: bun scripts/verify-first-visible-slice.mjs

  deploy:
    name: Deploy Worker production
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: cloudflare-production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "cloudflare-production",
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true,
              description: "Cloudflare Worker production deploy"
            });
            core.setOutput("id", deployment.data.id);

      - name: Deploy Worker
        id: deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -uo pipefail
          bunx wrangler deploy \
            --tag "sha-${GITHUB_SHA::7}" \
            --message "Production deploy for ${GITHUB_SHA}" \
            2>&1 | tee wrangler-deploy.log
          wrangler_status="${PIPESTATUS[0]}"
          set -e
          if [ "$wrangler_status" -ne 0 ]; then
            if grep -aEiq 'Authentication|authenticating Wrangler|Invalid access token|code: 10000|code: 9109|Unauthorized|(^|[^0-9])401([^0-9]|$)' wrangler-deploy.log; then
              echo "Cloudflare production deploy skipped because Wrangler credentials were rejected."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit "$wrangler_status"
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev[^[:space:]]*' wrangler-deploy.log | head -n 1 || true)"
          if [ -z "$url" ]; then
            url="https://${CLOUDFLARE_WORKER_NAME}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        if: steps.deploy.outputs.skipped != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
          DEPLOY_URL: '${{ steps.deploy.outputs.url }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "success",
              environment_url: process.env.DEPLOY_URL,
              description: "Cloudflare Worker production deploy succeeded"
            });

      - name: Mark deployment skipped
        if: steps.deploy.outputs.skipped == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "inactive",
              description: "Cloudflare Worker production deploy skipped because credentials were rejected"
            });

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.id
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "failure",
              description: "Cloudflare Worker production deploy failed"
            });
