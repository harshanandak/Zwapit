name: Cloudflare Worker Production

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_WORKER_NAME: zwapit
  CLOUDFLARE_WORKERS_SUBDOMAIN: harshananda57
  PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.PRODUCTION_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.PRODUCTION_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
  PUBLIC_CONVEX_URL: ${{ vars.PRODUCTION_PUBLIC_CONVEX_URL || secrets.PRODUCTION_PUBLIC_CONVEX_URL || vars.PUBLIC_CONVEX_URL || secrets.PUBLIC_CONVEX_URL }}

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  production-start:
    name: Publish production queued status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    outputs:
      deployment_id: ${{ steps.report.outputs.deployment_id }}
    steps:
      - name: Publish queued production status
        id: report
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "cloudflare-production",
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true,
              description: "Cloudflare Worker production deploy"
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: "queued",
              log_url: runUrl,
              description: "Cloudflare Worker production deploy queued"
            });

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "pending",
              target_url: runUrl,
              description: "Queued - waiting for production gates",
              context: "Cloudflare Production - zwapit"
            });

            core.setOutput("deployment_id", String(deployment.data.id));

  validate:
    name: Production gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Route coverage
        run: bun run check:routes

      - name: Unit and acceptance tests
        run: bun test

      - name: Audit dependencies
        run: bun audit

      - name: Acceptance verification
        run: bun scripts/verify-first-visible-slice.mjs

  production-gate-failed:
    name: Close failed production gate status
    runs-on: ubuntu-latest
    needs:
      - production-start
      - validate
    if: ${{ always() && (needs.validate.result == 'failure' || needs.validate.result == 'cancelled' || needs.validate.result == 'skipped') }}
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - name: Publish failed production gate status
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ needs.production-start.outputs.deployment_id }}'
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (process.env.DEPLOYMENT_ID) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: Number(process.env.DEPLOYMENT_ID),
                state: "failure",
                log_url: runUrl,
                description: "Cloudflare Worker production gates failed"
              });
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "failure",
              target_url: runUrl,
              description: "Production gates failed",
              context: "Cloudflare Production - zwapit"
            });

  deploy:
    name: Deploy Worker production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    needs:
      - production-start
      - validate
    environment:
      name: cloudflare-production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Mark deployment in progress
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ needs.production-start.outputs.deployment_id }}'
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "in_progress",
              log_url: runUrl,
              description: "Uploading Cloudflare Worker production"
            });
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "pending",
              target_url: runUrl,
              description: "Building - uploading Cloudflare production",
              context: "Cloudflare Production - zwapit"
            });

      - name: Deploy Worker
        id: deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -uo pipefail
          set +e
          wrangler_output="$(bunx wrangler deploy \
            --tag "sha-${GITHUB_SHA::7}" \
            --message "Production deploy for ${GITHUB_SHA}" \
            2>&1)"
          wrangler_status="$?"
          set -e
          printf '%s\n' "$wrangler_output" | tee wrangler-deploy.log
          if [ "$wrangler_status" -ne 0 ]; then
            case "$wrangler_output" in
              *Authentication*|*authenticating\ Wrangler*|*Invalid\ access\ token*|*code:\ 10000*|*code:\ 9109*|*Unauthorized*|*401*)
                echo "Cloudflare production deploy skipped because Wrangler credentials were rejected."
                echo "skipped=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
            exit "$wrangler_status"
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev[^[:space:]]*' wrangler-deploy.log | head -n 1 || true)"
          if [ -z "$url" ]; then
            url="https://${CLOUDFLARE_WORKER_NAME}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        if: steps.deploy.outputs.skipped != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ needs.production-start.outputs.deployment_id }}'
          DEPLOY_URL: '${{ steps.deploy.outputs.url }}'
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "success",
              environment_url: process.env.DEPLOY_URL,
              log_url: runUrl,
              description: "Cloudflare Worker production deploy succeeded"
            });
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              target_url: process.env.DEPLOY_URL,
              description: "Production deployment has completed",
              context: "Cloudflare Production - zwapit"
            });

      - name: Mark deployment skipped
        if: steps.deploy.outputs.skipped == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ needs.production-start.outputs.deployment_id }}'
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "inactive",
              log_url: runUrl,
              description: "Cloudflare Worker production deploy skipped because credentials were rejected"
            });
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "failure",
              target_url: runUrl,
              description: "Production skipped - Cloudflare credentials rejected",
              context: "Cloudflare Production - zwapit"
            });

      - name: Mark deployment failure
        if: failure() && needs.production-start.outputs.deployment_id
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ needs.production-start.outputs.deployment_id }}'
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "failure",
              log_url: runUrl,
              description: "Cloudflare Worker production deploy failed"
            });
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "failure",
              target_url: runUrl,
              description: "Production deployment failed",
              context: "Cloudflare Production - zwapit"
            });
