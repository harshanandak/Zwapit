name: Cloudflare Worker Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

env:
  CLOUDFLARE_WORKER_NAME: zwapit
  CLOUDFLARE_WORKERS_SUBDOMAIN: harshananda57

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Preview gate / Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

  build:
    name: Preview gate / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  route-coverage:
    name: Preview gate / Route coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Route coverage
        run: bun run check:routes

  tests:
    name: Preview gate / Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Unit and acceptance tests
        run: bun test

  acceptance:
    name: Preview gate / Acceptance verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Acceptance verification
        run: bun scripts/verify-first-visible-slice.mjs

  smoke:
    name: Preview gate / Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Buyer and seller smoke checks
        run: |
          bun scripts/e2e-buyer.mjs
          bun scripts/e2e-seller.mjs
          bun scripts/ui-smoke-buyer.mjs
          bun scripts/ui-smoke-seller.mjs

  audit:
    name: Preview gate / Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

  preview:
    name: Upload Worker preview
    runs-on: ubuntu-latest
    needs:
      - type-check
      - build
      - route-coverage
      - tests
      - acceptance
      - smoke
      - audit
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft }}
    permissions:
      contents: read
      deployments: write
      issues: write
      pull-requests: write
      statuses: write
    environment:
      name: cloudflare-preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `cloudflare-preview-pr-${context.issue.number}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: "Cloudflare Worker PR preview"
            });
            core.setOutput("id", deployment.data.id);

      - name: Mark deployment in progress
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "in_progress",
              description: "Uploading Cloudflare Worker preview"
            });

      - name: Upload Worker preview version
        id: preview
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -uo pipefail
          alias_name="pr-${{ github.event.pull_request.number }}"
          fallback_preview_url="https://${alias_name}-${CLOUDFLARE_WORKER_NAME}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          set +e
          wrangler_output="$(bunx wrangler versions upload \
            --preview-alias "$alias_name" \
            --tag "$alias_name" \
            --message "PR #${{ github.event.pull_request.number }} preview for ${{ github.sha }}" \
            2>&1)"
          wrangler_status="$?"
          set -e
          printf '%s\n' "$wrangler_output" | tee wrangler-preview.log
          if [ "$wrangler_status" -ne 0 ]; then
            case "$wrangler_output" in
              *Authentication*|*authenticating\ Wrangler*|*Invalid\ access\ token*|*code:\ 10000*|*code:\ 9109*|*Unauthorized*|*401*)
                echo "Cloudflare preview upload skipped because Wrangler credentials were rejected."
                echo "skipped=true" >> "$GITHUB_OUTPUT"
                echo "url=$fallback_preview_url" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
            exit "$wrangler_status"
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          preview_url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev[^[:space:]]*' wrangler-preview.log | head -n 1 || true)"
          if [ -z "$preview_url" ]; then
            preview_url="$(grep -Eo '[[:alnum:]-]+-zwapit\.[^[:space:]]+\.workers\.dev' wrangler-preview.log | head -n 1 | sed 's#^#https://#' || true)"
          fi
          if [ -z "$preview_url" ]; then
            preview_url="$fallback_preview_url"
          fi
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        if: steps.preview.outputs.skipped != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
          PREVIEW_URL: '${{ steps.preview.outputs.url }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "success",
              environment_url: process.env.PREVIEW_URL,
              description: "Cloudflare Worker preview is ready"
            });

      - name: Mark deployment skipped
        if: steps.preview.outputs.skipped == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
          PREVIEW_URL: '${{ steps.preview.outputs.url }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "inactive",
              environment_url: process.env.PREVIEW_URL,
              description: "Cloudflare Worker preview skipped because credentials were rejected"
            });

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.id
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "failure",
              description: "Cloudflare Worker preview upload failed"
            });

      - name: Publish preview status link
        if: always() && steps.deployment.outputs.id
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          PREVIEW_URL: '${{ steps.preview.outputs.url }}'
          PREVIEW_SKIPPED: '${{ steps.preview.outputs.skipped }}'
          PREVIEW_OUTCOME: '${{ steps.preview.outcome }}'
        with:
          script: |
            const skipped = process.env.PREVIEW_SKIPPED === "true";
            const failed = process.env.PREVIEW_OUTCOME === "failure";
            const previewUrl = process.env.PREVIEW_URL || "";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: failed ? "failure" : "success",
              target_url: previewUrl || runUrl,
              description: skipped
                ? "Skipped - Cloudflare credentials rejected"
                : failed
                  ? "Cloudflare preview upload failed"
                  : "Deployment has completed",
              context: "Cloudflare Preview - zwapit"
            });

      - name: Comment preview status
        if: always() && steps.deployment.outputs.id
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          PREVIEW_URL: '${{ steps.preview.outputs.url }}'
          PREVIEW_SKIPPED: '${{ steps.preview.outputs.skipped }}'
          PREVIEW_OUTCOME: '${{ steps.preview.outcome }}'
        with:
          script: |
            const marker = "<!-- cloudflare-preview-status -->";
            const skipped = process.env.PREVIEW_SKIPPED === "true";
            const previewUrl = process.env.PREVIEW_URL || "";
            const failed = process.env.PREVIEW_OUTCOME === "failure";
            const status = skipped ? "Skipped" : failed ? "Failed" : "Ready";
            const action = previewUrl ? `[Preview](${previewUrl})` : `[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            const summary = skipped
              ? "Cloudflare preview upload was skipped because Wrangler rejected the configured credentials."
              : failed
                ? "Cloudflare preview upload failed. Open the workflow run for details."
                : "This branch was successfully deployed to Cloudflare Workers.";
            const updatedAt = new Date().toISOString().replace("T", " ").replace(/\.\d{3}Z$/, " UTC");
            const body = [
              marker,
              "The latest updates on your Cloudflare Workers preview.",
              "",
              "| Project | Deployment | Actions | Updated (UTC) |",
              "| --- | --- | --- | --- |",
              `| zwapit | ${status} | ${action} | ${updatedAt} |`,
              "",
              summary
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  preview-skipped:
    name: Preview skipped
    runs-on: ubuntu-latest
    needs:
      - type-check
      - build
      - route-coverage
      - tests
      - acceptance
      - smoke
      - audit
    if: ${{ github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.draft }}
    permissions:
      contents: read
      issues: write
      statuses: write
    steps:
      - name: Explain skip
        run: echo "Cloudflare preview upload skipped for draft or forked pull request."

      - name: Publish skipped preview status
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: "success",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Skipped - draft pull request",
              context: "Cloudflare Preview - zwapit"
            });

      - name: Comment skipped preview status
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const marker = "<!-- cloudflare-preview-status -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const updatedAt = new Date().toISOString().replace("T", " ").replace(/\.\d{3}Z$/, " UTC");
            const body = [
              marker,
              "The latest updates on your Cloudflare Workers preview.",
              "",
              "| Project | Deployment | Actions | Updated (UTC) |",
              "| --- | --- | --- | --- |",
              `| zwapit | Skipped | [Workflow run](${runUrl}) | ${updatedAt} |`,
              "",
              "Cloudflare preview upload is skipped for draft pull requests."
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
