name: Cloudflare Worker Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  CLOUDFLARE_WORKER_NAME: zwapit
  CLOUDFLARE_WORKERS_SUBDOMAIN: harshananda57

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Preview gate / Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

  build:
    name: Preview gate / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  route-coverage:
    name: Preview gate / Route coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Route coverage
        run: bun run check:routes

  tests:
    name: Preview gate / Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Unit and acceptance tests
        run: bun test

  acceptance:
    name: Preview gate / Acceptance verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Acceptance verification
        run: bun scripts/verify-first-visible-slice.mjs

  smoke:
    name: Preview gate / Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Buyer and seller smoke checks
        run: |
          bun scripts/e2e-buyer.mjs
          bun scripts/e2e-seller.mjs
          bun scripts/ui-smoke-buyer.mjs
          bun scripts/ui-smoke-seller.mjs

  audit:
    name: Preview gate / Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

  preview:
    name: Upload Worker preview
    runs-on: ubuntu-latest
    needs:
      - type-check
      - build
      - route-coverage
      - tests
      - acceptance
      - smoke
      - audit
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft }}
    environment:
      name: cloudflare-preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `cloudflare-preview-pr-${context.issue.number}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: "Cloudflare Worker PR preview"
            });
            core.setOutput("id", deployment.data.id);

      - name: Mark deployment in progress
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "in_progress",
              description: "Uploading Cloudflare Worker preview"
            });

      - name: Upload Worker preview version
        id: preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          alias_name="pr-${{ github.event.pull_request.number }}"
          bunx wrangler versions upload \
            --preview-alias "$alias_name" \
            --tag "$alias_name" \
            --message "PR #${{ github.event.pull_request.number }} preview for ${{ github.sha }}" \
            2>&1 | tee wrangler-preview.log
          preview_url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev[^[:space:]]*' wrangler-preview.log | head -n 1 || true)"
          if [ -z "$preview_url" ]; then
            preview_url="$(grep -Eo '[[:alnum:]-]+-zwapit\.[^[:space:]]+\.workers\.dev' wrangler-preview.log | head -n 1 | sed 's#^#https://#' || true)"
          fi
          if [ -z "$preview_url" ]; then
            preview_url="https://${alias_name}-${CLOUDFLARE_WORKER_NAME}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          fi
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
          PREVIEW_URL: '${{ steps.preview.outputs.url }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "success",
              environment_url: process.env.PREVIEW_URL,
              description: "Cloudflare Worker preview is ready"
            });

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.id
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          DEPLOYMENT_ID: '${{ steps.deployment.outputs.id }}'
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: "failure",
              description: "Cloudflare Worker preview upload failed"
            });

  preview-skipped:
    name: Preview skipped
    runs-on: ubuntu-latest
    needs:
      - type-check
      - build
      - route-coverage
      - tests
      - acceptance
      - smoke
      - audit
    if: ${{ github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.draft }}
    steps:
      - name: Explain skip
        run: echo "Cloudflare preview upload skipped for draft or forked pull request."
