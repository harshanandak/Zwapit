name: Cloudflare Worker Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  CLOUDFLARE_WORKER_NAME: zwapit
  CLOUDFLARE_WORKERS_SUBDOMAIN: harshananda57

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate preview build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Route coverage
        run: bun run check:routes

      - name: Unit and acceptance tests
        run: bun test

      - name: Audit dependencies
        run: bun audit

      - name: Acceptance verification
        run: bun scripts/verify-first-visible-slice.mjs

      - name: Buyer and seller smoke checks
        run: |
          bun scripts/e2e-buyer.mjs
          bun scripts/e2e-seller.mjs
          bun scripts/ui-smoke-buyer.mjs
          bun scripts/ui-smoke-seller.mjs

  preview:
    name: Upload Worker preview
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft }}
    environment:
      name: cloudflare-preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `cloudflare-preview-pr-${context.issue.number}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: "Cloudflare Worker PR preview"
            });
            core.setOutput("id", deployment.data.id);

      - name: Mark deployment in progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.deployment.outputs.id }}"),
              state: "in_progress",
              description: "Uploading Cloudflare Worker preview"
            });

      - name: Upload Worker preview version
        id: preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          alias_name="pr-${{ github.event.pull_request.number }}"
          bunx wrangler versions upload \
            --preview-alias "$alias_name" \
            --tag "$alias_name" \
            --message "PR #${{ github.event.pull_request.number }} preview for ${{ github.sha }}" \
            2>&1 | tee wrangler-preview.log
          preview_url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev[^[:space:]]*' wrangler-preview.log | head -n 1 || true)"
          if [ -z "$preview_url" ]; then
            preview_url="$(grep -Eo '[[:alnum:]-]+-zwapit\.[^[:space:]]+\.workers\.dev' wrangler-preview.log | head -n 1 | sed 's#^#https://#' || true)"
          fi
          if [ -z "$preview_url" ]; then
            preview_url="https://${alias_name}-${CLOUDFLARE_WORKER_NAME}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          fi
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.deployment.outputs.id }}"),
              state: "success",
              environment_url: "${{ steps.preview.outputs.url }}",
              description: "Cloudflare Worker preview is ready"
            });

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- cloudflare-worker-preview -->";
            const body = `${marker}
            ## Cloudflare Worker Preview

            Preview: ${{ steps.preview.outputs.url }}

            - Worker: \`${process.env.CLOUDFLARE_WORKER_NAME}\`
            - Alias: \`pr-${context.issue.number}\`
            - Commit: \`${context.payload.pull_request.head.sha}\`
            - Validation: check, build, route coverage, tests, audit, acceptance verifier, and smoke scripts passed`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  preview-skipped:
    name: Preview skipped
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.draft }}
    steps:
      - name: Explain skip
        run: echo "Cloudflare preview upload skipped for draft or forked pull request."
